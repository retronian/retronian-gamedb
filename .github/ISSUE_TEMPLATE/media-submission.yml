name: "🖼  Add an image (boxart / titlescreen / screenshot)"
description: "Help fill in a missing boxart, title screen, screenshot, cartridge photo, etc."
title: "[media] "
labels: ["media"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing!

        Use this form to add a box scan, title screen, screenshot, or
        cartridge photo to a game entry.

        **Licensing.** Only submit images you have the right to redistribute
        under CC BY-SA 4.0 — scans of your own collection, photos you took
        yourself, or Wikimedia Commons / public-domain sources. Do **not**
        submit images lifted from MobyGames, IGDB, ScreenScraper, or
        publisher press kits.

  - type: input
    id: platform
    attributes:
      label: Platform
      description: |
        One of `fc`, `sfc`, `gb`, `gbc`, `gba`, `md`, `pce`, `saturn`, `n64`, `nds`, `ps1`, `ps2`.
      placeholder: gb
    validations:
      required: true

  - type: input
    id: game_id
    attributes:
      label: Game ID
      description: |
        The slug of the entry as seen on the site URL
        (e.g. `https://gamedb.retronian.com/games/gb/tv-champion/` -> `tv-champion`).
      placeholder: tv-champion
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - boxart
        - boxart_back
        - titlescreen
        - screenshot
        - cartridge
        - disc
        - logo
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      description: Which regional version does this image come from?
      options:
        - jp
        - us
        - eu
        - kr
        - cn
        - tw
        - hk
        - au
        - br
    validations:
      required: true

  - type: textarea
    id: image
    attributes:
      label: Image
      description: |
        Drag the image file into this box to attach it, or paste a stable
        public URL (Wikimedia Commons, Internet Archive). Keep under ~10 MB.
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Source and licence
      description: |
        Where is this image from? Required so we can redistribute it.

        Examples:
        - "Scan of my own physical copy"
        - "Photo I took of my cartridge"
        - "Wikimedia Commons: <URL>"
      placeholder: Scan of my own physical copy, bought 2012.
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I confirm the image may be redistributed under CC BY-SA 4.0.
          required: true
        - label: I did not copy the image from MobyGames, IGDB, ScreenScraper, or a publisher press kit.
          required: true
