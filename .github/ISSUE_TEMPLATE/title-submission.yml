name: "🈂️  Add a native-script title (ja / ko / zh / ...)"
description: "Help fill in a missing Japanese / Korean / Chinese / other native-script title."
title: "[title] "
labels: ["title"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to add a Japanese (kanji / hiragana / katakana),
        Korean (Hangul), Chinese (Hans / Hant) or other non-Latin title
        to a game entry.

        **Primary sources preferred** — the physical box, title screen,
        printed manual, or the publisher's official site. Wikipedia is
        acceptable as long as you cite it.

  - type: input
    id: platform
    attributes:
      label: Platform
      description: |
        One of `fc`, `sfc`, `gb`, `gbc`, `gba`, `md`, `pce`, `saturn`, `n64`, `nds`, `ps1`, `ps2`.
      placeholder: fc
    validations:
      required: true

  - type: input
    id: game_id
    attributes:
      label: Game ID
      description: The slug as seen on the site URL (e.g. `hoshi-no-kirby`).
      placeholder: hoshi-no-kirby
    validations:
      required: true

  - type: input
    id: text
    attributes:
      label: Title text
      description: The actual title, written in the native script.
      placeholder: 星のカービィ
    validations:
      required: true

  - type: dropdown
    id: lang
    attributes:
      label: Language
      description: ISO 639-1 language code.
      options:
        - ja
        - ko
        - zh
        - en
        - fr
        - es
        - de
        - it
        - pt
        - ru
    validations:
      required: true

  - type: dropdown
    id: script
    attributes:
      label: "Script (ISO 15924)"
      description: |
        - `Jpan`: Japanese with kanji
        - `Hira`: Japanese, hiragana only
        - `Kana`: Japanese, katakana only
        - `Hang`: Korean Hangul
        - `Hans`: Simplified Chinese
        - `Hant`: Traditional Chinese
        - `Latn`: Latin (for romaji or a genuinely Latin-on-box title)
      options:
        - Jpan
        - Hira
        - Kana
        - Hang
        - Hans
        - Hant
        - Latn
        - Cyrl
        - Arab
        - Thai
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      description: Which regional release does this title come from?
      options:
        - jp
        - us
        - eu
        - kr
        - cn
        - tw
        - hk
      default: 0
    validations:
      required: true

  - type: dropdown
    id: form
    attributes:
      label: Form
      description: Where does this title appear?
      options:
        - official
        - boxart
        - ingame_logo
        - manual
        - romaji_transliteration
        - alternate
      default: 0

  - type: textarea
    id: source
    attributes:
      label: Source
      description: |
        Where did you find this title? Required.

        Examples:
        - "Box art of my own copy"
        - "Title screen of the game"
        - "https://ja.wikipedia.org/wiki/..."
        - "Official Nintendo page: <URL>"
      placeholder: Box art of my own copy
    validations:
      required: true

  - type: checkboxes
    id: verified
    attributes:
      label: Verification
      options:
        - label: I have verified this title against a primary source (box, title screen, manual, or publisher page).
          required: false
